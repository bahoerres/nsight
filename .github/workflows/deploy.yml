name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to docker-top
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DOCKER_TOP_HOST }}
          username: sysadmin
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/sysadmin/stacks/nsight
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/bahoerres/nsight.git
            git pull origin main
            .venv/bin/pip install --quiet -r requirements.txt 2>/dev/null || true
            systemctl --user restart nsight-web
